<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kurir — Nitip Tuban</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amber: #f59e0b; --amber-d: #92400e; --amber-p: #fffbeb;
    --teal: #2ABFB3; --teal-d: #0a7a72;
    --ink: #0f1923; --muted: #6b7a8a; --border: #e2e8f0;
    --bg: #fafaf8;
  }

  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── LAYOUT: split pane ── */
  .layout { flex: 1; display: flex; overflow: hidden; }

  /* ── LEFT PANE: order list ── */
  .pane-left {
    width: 300px;
    flex-shrink: 0;
    background: #fff;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .pane-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .kurir-avatar {
    width: 36px; height: 36px;
    background: var(--amber-p);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  .kurir-name { font-size: 14px; font-weight: 800; color: var(--ink); }
  .kurir-code { font-size: 11px; color: var(--muted); }

  .logout-btn {
    margin-left: auto;
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 12px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background .15s;
    font-family: inherit;
  }
  .logout-btn:hover { background: #fee2e2; color: #ef4444; }

  .order-list { flex: 1; overflow-y: auto; }

  .order-item {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .15s;
    position: relative;
  }

  .order-item:hover { background: #fafaf8; }
  .order-item.active { background: var(--amber-p); border-left: 3px solid var(--amber); }

  .order-item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .order-item-id { font-size: 13px; font-weight: 800; color: var(--ink); }
  .order-item-time { font-size: 11px; color: var(--muted); }
  .order-item-layanan { font-size: 12px; color: var(--muted); }
  .order-item-user { font-size: 12px; color: var(--teal-d); font-weight: 600; margin-top: 2px; }

  .unread-dot {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    width: 8px; height: 8px;
    background: var(--amber);
    border-radius: 50%;
  }

  .status-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
  }

  /* ── RIGHT PANE: chat ── */
  .pane-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-header {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .chat-header-info { flex: 1; }
  .chat-header-id { font-size: 14px; font-weight: 800; color: var(--ink); }
  .chat-header-sub { font-size: 12px; color: var(--muted); }

  .done-btn {
    padding: 7px 16px;
    background: #f0fdf4;
    border: 1px solid #a7f3d0;
    color: #166534;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s;
  }
  .done-btn:hover { background: #dcfce7; }

  .sec-banner {
    background: #fffbeb;
    border-bottom: 1px solid #fde68a;
    padding: 7px 20px;
    font-size: 12px;
    color: var(--amber-d);
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg-group { display: flex; flex-direction: column; gap: 2px; }
  .msg-group.me { align-items: flex-end; }
  .msg-group.other { align-items: flex-start; }
  .msg-group.system { align-items: center; }

  .msg-sender { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 3px; padding: 0 4px; }

  .bubble {
    max-width: 68%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }

  .me .bubble { background: var(--amber); color: #fff; border-bottom-right-radius: 4px; }
  .other .bubble { background: #fff; color: var(--ink); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .system .bubble { background: #fffbeb; color: var(--amber-d); border: 1px solid #fde68a; border-radius: 10px; font-size: 12px; max-width: 90%; text-align: center; padding: 7px 14px; }
  .admin-bubble { background: #fef3c7 !important; border-color: #fde68a !important; }
  .bubble.flagged { border-left: 3px solid #ef4444 !important; }

  .msg-time { font-size: 10px; color: var(--muted); margin-top: 2px; padding: 0 4px; }

  .input-area {
    background: #fff;
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-shrink: 0;
  }

  .msg-input {
    flex: 1;
    min-height: 42px; max-height: 120px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    resize: none; outline: none; line-height: 1.4;
    transition: border-color .15s;
  }
  .msg-input:focus { border-color: var(--amber); }

  .send-btn {
    width: 42px; height: 42px;
    background: var(--amber);
    border: none; border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, transform .1s;
  }
  .send-btn:hover { background: #d97706; }
  .send-btn:active { transform: scale(.94); }
  .send-btn svg { width: 18px; height: 18px; fill: #fff; }

  .empty-chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 10px;
    font-size: 14px;
  }
  .empty-chat .big { font-size: 44px; }

  .empty-orders {
    padding: 32px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin 1s linear infinite; }

  /* Mobile: stack panes */
  @media (max-width: 640px) {
    .pane-left { width: 100%; display: none; }
    .pane-left.show-mobile { display: flex; }
    .pane-right { width: 100%; }
    .pane-right.hide-mobile { display: none; }
    .back-mobile { display: flex !important; }
  }

  .back-mobile {
    display: none;
    background: none; border: none; cursor: pointer;
    color: var(--muted); align-items: center;
  }
</style>
</head>
<body>

<div class="layout">
  <!-- LEFT: Order list -->
  <div class="pane-left show-mobile" id="pane-left">
    <div class="pane-header">
      <div class="kurir-avatar">🛵</div>
      <div>
        <div class="kurir-name" id="kurir-name">Kurir</div>
        <div class="kurir-code" id="kurir-code-display">—</div>
      </div>
      <button class="logout-btn" onclick="signOut()">Keluar</button>
    </div>
    <div class="order-list" id="order-list">
      <div class="empty-orders"><span class="spin">⟳</span> Memuat order…</div>
    </div>
  </div>

  <!-- RIGHT: Chat -->
  <div class="pane-right" id="pane-right">
    <div class="chat-header">
      <button class="back-mobile" onclick="showList()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <div class="chat-header-info">
        <div class="chat-header-id" id="chat-title">Pilih order di kiri</div>
        <div class="chat-header-sub" id="chat-sub">—</div>
      </div>
      <button class="done-btn" id="done-btn" onclick="markDone()" style="display:none">✓ Selesai</button>
    </div>

    <div class="sec-banner">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
      Nomor HP & kontak pribadi otomatis disembunyikan
    </div>

    <div class="messages" id="messages">
      <div class="empty-chat">
        <div class="big">🛵</div>
        <div>Pilih order di daftar kiri</div>
        <div style="font-size:12px">untuk mulai chat dengan user</div>
      </div>
    </div>

    <div class="input-area" id="input-area" style="display:none">
      <textarea class="msg-input" id="msg-input" placeholder="Ketik pesan ke user…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
let _profile = null;
let _activeOrderId = null;
let _sub = null;
let _orders = [];

async function init() {
  const session = await getSession();
  if (!session) { location.href = 'index.html'; return; }

  _profile = await getProfile(session.user.id);
  if (!_profile || _profile.role !== 'kurir') {
    await signOut(); return;
  }

  document.getElementById('kurir-name').textContent = _profile.name;
  document.getElementById('kurir-code-display').textContent = `Kode: ${_profile.kurir_code ?? '—'}`;

  await loadOrders();

  // Subscribe to new order assignments
  _sb.channel('kurir-orders')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'orders', filter: `kurir_id=eq.${_profile.id}` }, () => loadOrders())
    .subscribe();
}

async function loadOrders() {
  _orders = await fetchKurirOrders(_profile.id);
  const list = document.getElementById('order-list');

  if (!_orders.length) {
    list.innerHTML = '<div class="empty-orders">Belum ada order yang di-assign ke kamu.</div>';
    return;
  }

  list.innerHTML = _orders.map(o => {
    const badge = statusBadge(o.status);
    const isActive = o.id === _activeOrderId;
    return `
      <div class="order-item ${isActive ? 'active' : ''}" onclick="openOrder('${o.id}')">
        <div class="order-item-top">
          <span class="order-item-id">#${shortId(o.id)}</span>
          <span class="status-pill" style="background:${badge.color}22;color:${badge.color}">${badge.label}</span>
        </div>
        <div class="order-item-layanan">${o.layanan}</div>
        <div class="order-item-time">${formatDate(o.created_at)}</div>
      </div>`;
  }).join('');
}

async function openOrder(orderId) {
  _activeOrderId = orderId;
  loadOrders(); // refresh active state

  const order = _orders.find(o => o.id === orderId);
  document.getElementById('chat-title').textContent = `Order #${shortId(orderId)}`;
  document.getElementById('chat-sub').textContent = order?.layanan ?? '—';

  const doneBtn = document.getElementById('done-btn');
  doneBtn.style.display = order?.status === 'active' ? 'block' : 'none';
  document.getElementById('input-area').style.display = 'flex';

  // Unsubscribe previous
  if (_sub) { await _sb.removeChannel(_sub); _sub = null; }

  await loadMessages();

  _sub = subscribeMessages(orderId, (msg) => {
    if (document.querySelector(`[data-msg-id="${msg.id}"]`)) return;
    appendMsg(msg);
  });

  // Mobile: show right pane
  document.getElementById('pane-left').classList.remove('show-mobile');
  document.getElementById('pane-right').classList.remove('hide-mobile');
}

function showList() {
  document.getElementById('pane-left').classList.add('show-mobile');
  document.getElementById('pane-right').classList.add('hide-mobile');
}

async function loadMessages() {
  const msgs = await fetchMessages(_activeOrderId);
  const container = document.getElementById('messages');
  container.innerHTML = '';
  msgs.forEach(m => appendMsg(m));
  container.scrollTop = container.scrollHeight;
}

function appendMsg(msg) {
  const container = document.getElementById('messages');
  const es = container.querySelector('.empty-chat');
  if (es) es.remove();

  const isMe = msg.sender_id === _profile.id;
  const isSystem = msg.role === 'system';
  const groupClass = isSystem ? 'system' : isMe ? 'me' : 'other';

  const senderName = isMe ? 'Kamu' : msg.role === 'admin' ? '⚙️ Admin' : '🙋 User';
  let bClass = 'bubble';
  if (msg.is_flagged) bClass += ' flagged';
  if (msg.role === 'admin') bClass += ' admin-bubble';

  const el = document.createElement('div');
  el.className = `msg-group ${groupClass}`;
  el.dataset.msgId = msg.id;
  el.innerHTML = `
    ${!isMe && !isSystem ? `<div class="msg-sender">${senderName}</div>` : ''}
    <div class="${bClass}">${escHtml(msg.content)}${msg.is_flagged ? '<br><small style="opacity:.7">⚠️ kontak disembunyikan oleh sistem</small>' : ''}</div>
    <div class="msg-time">${formatTime(msg.created_at)}</div>
  `;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

async function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !_activeOrderId) return;
  input.value = '';
  autoResize(input);
  await sendMessage(_activeOrderId, _profile.id, 'kurir', text);
}

async function markDone() {
  if (!_activeOrderId || !confirm('Tandai order ini sebagai selesai?')) return;
  await updateOrderStatus(_activeOrderId, 'done');
  await sendMessage(_activeOrderId, _profile.id, 'system', '✅ Kurir menandai order ini sebagai SELESAI.');
  document.getElementById('done-btn').style.display = 'none';
  loadOrders();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

init();
</script>
</body>
</html>
